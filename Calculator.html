<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Interactive Calculator</title>
	<style>
		* {
			box-sizing: border-box;
			margin: 0;
			padding: 0;
		}

		body {
			display: flex;
			justify-content: center;
			align-items: center;
			height: 100vh;
			background-color: #fff;
			font-family: 'Segoe UI', Arial, sans-serif;
		}

		.calculator {
			width: 340px;
			background-color: #000;
			padding: 20px;
			border-radius: 20px;
			box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5);
		}

		.display {
			width: 100%;
			height: 80px;
			background: #fff;
			color: #000;
			text-align: right;
			padding: 20px;
			font-size: 2.5rem;
			margin-bottom: 20px;
			border-radius: 10px;
			overflow: hidden;
			display: flex;
			align-items: center;
			justify-content: flex-end;
		}

		.buttons {
			display: grid;
			grid-template-columns: repeat(4, 1fr);
			gap: 12px;
		}

		button {
			height: 60px;
			font-size: 1.25rem;
			border: none;
			border-radius: 10px;
			cursor: pointer;
			background-color: #fff;
			color: #000;
			transition: background 0.2s, transform 0.1s;
		}

		button:hover {
			background-color: #e0e0e0;
		}

		button:active {
			transform: scale(0.95);
		}

		.operator {
			background-color: #f39c12;
		}

		.operator:hover {
			background-color: #e67e22;
		}

		.double {
			grid-column: span 2;
		}

		.clear {
			background-color: #c0392b;
		}

		.clear:hover {
			background-color: #e02716;
		}

		.equals {
			background-color: #27ae60;
		}

		.equals:hover {
			background-color: #1cba5e;
		}
	</style>
</head>

<body>

	<div class="calculator">
		<div class="display" id="display">0</div>
		<div class="buttons">
			<button id="btn-7" onclick="press('7')">7</button>
			<button id="btn-8" onclick="press('8')">8</button>
			<button id="btn-9" onclick="press('9')">9</button>
			<button id="btn-add" class="operator" onclick="press('+')">+</button>

			<button id="btn-4" onclick="press('4')">4</button>
			<button id="btn-5" onclick="press('5')">5</button>
			<button id="btn-6" onclick="press('6')">6</button>
			<button id="btn-subtract" class="operator" onclick="press('-')">-</button>

			<button id="btn-1" onclick="press('1')">1</button>
			<button id="btn-2" onclick="press('2')">2</button>
			<button id="btn-3" onclick="press('3')">3</button>
			<button id="btn-multiply" class="operator" onclick="press('*')">*</button>

			<button id="btn-0" class="double" onclick="press('0')">0</button>
			<button id="btn-dot" onclick="press('.')">.</button>
			<button id="btn-divide" class="operator" onclick="press('/')">/</button>

			<button id="btn-clear" class="clear" onclick="clearDisplay()">C</button>
			<button id="btn-equals" class="equals" onclick="calculate()">=</button>
			<button id="btn-lbracket" class="operator" onclick="press('(')">(</button>
			<button id="btn-rbracket" class="operator" onclick="press(')')">)</button>
		</div>
	</div>

	<script src="Calculator.js"></script>

</body>

</html>
